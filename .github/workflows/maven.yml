name: Java CI with Maven and Cucumber

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 (as defined in your pom.xml compiler properties)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Run Cucumber/JUnit Tests via Maven
      - name: Run Tests with Maven
        run: mvn clean test

      # Step 4: Archive and Upload ExtentReports / Cucumber Reports
      - name: Upload Test Reports
        if: always() # Ensures reports are uploaded even if some test scenarios fail
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-reports
          path: |
            reports/
            target/CucumberReports/